<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            background: #ccc;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .card {
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #bbb;
}

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            background: #ddd;
            padding: 15px;
            flex: 1 1 40px;
            margin: 5px;
            text-align: center;
            font-weight: bold;
        }

        .graph {
            background: #ccc;
            padding: 20px;
            height: 500px;
            margin: 20px 0;
        }

        .bottom {
            display: flex;
            justify-content: space-between;
        }

        .box {
            background: #ccc;
            padding: 20px;
            width: 48%;
        }

        .box:hover {
    background: #bbb;
}
@media (max-width: 768px) {
    
    .stats {
        flex-direction: column;
    }

    .bottom {
        flex-direction: column;
    }

    .box {
        width: 90%;
        margin-bottom: 10px;
    }

    .container {
        width: 90%;
        height: auto;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 20px;
    }
    .graph {
    width: 90%;
    height: auto;
    }   
}
    </style>
</head>
<body>

<div class="container">

    <h1>Greenhouse Dashboard</h1>

    <!-- Stats -->
    <div class="stats">
    <div class="card" id="tempCard">Temperature: <span id="temp">--</span> °C</div>
    <div class="card" id="humCard">Humidity: <span id="humidity">--</span> %</div>
    <div class="card" id="soilCard">Soil Moisture: <span id="soil">--</span> %</div>
    <div class="card" id="lightCard">Light: <span id="light">--</span> µmol/m²/s</div>
</div>

<p>Last Updated: <span id="timestamp">--</span></p>

    <!-- Graph -->
    <div class="graph">
        <canvas id="chart"></canvas>
    </div>

    <!-- Bottom Section -->
    <div class="bottom">
        <div class="box">
            <h3>Alert!</h3>
            <p id="alert">No alerts</p>
        </div>

        <div class="box">
            <h3>Historical Data</h3>
            <p id="historical">
                View Table
                
            </p>
        </div>

<script>
document.getElementById('historical').addEventListener('click', () => {
  window.location.href = '/api/historical';
});
</script>
    </div>

</div>

<script>
let chart;      // global chart
let dataset;    // global data

fetch("/api/data")
    .then(res => res.json())
    .then(data => {

    if (data.length === 0) return;

    dataset = data;

    const latest = data[0];

    // Update tiles
    document.getElementById("temp").innerText = latest.temp;
    document.getElementById("humidity").innerText = latest.hum;
    document.getElementById("soil").innerText = latest.soil_moisture;
    document.getElementById("light").innerText = latest.par;

    document.getElementById("timestamp").innerText = latest.datetime;
    
    
    //buildTable().then(el => {
        //const container = document.getElementById('historical');
        //container.innerHTML = '';
        //container.appendChild(el);
    //});

    const alerts = [];

    const rules = [
    { key: "temp_status", above: "Temperature too high", below: "Temperature too low" },
    { key: "hum_status",  above: "Humidity too high",    below: "Humidity too low" },
    { key: "soil_status", above: "Soil too wet",         below: "Soil too dry" },
    { key: "par_status",  above: "PAR too high",         below: "PAR too low" }
    ];

    rules.forEach(({ key, above, below }) => {
    if (latest[key] === "above") alerts.push(above);
    if (latest[key] === "below") alerts.push(below);
    });

    const alertBox = document.getElementById("alert");

    if (alerts.length > 0) {
    alertBox.innerText = alerts.join(" | ");
    alertBox.style.color = "red";
    } else {
    alertBox.innerText = "No alerts";
    alertBox.style.color = "green";
    }

    // Create initial chart (temperature default)
    createChart("temp", "Temperature");

});
async function buildTable() {
  try {
    const response = await fetch('/api/data');

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();

    const table = document.createElement('table');
    table.border = "1";

    // HEADER
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');

    const headers = [
      'Datetime',
      'Temperature',
      'Humidity',
      'Soil Moisture',
      'PAR'
    ];

    headers.forEach(text => {
      const th = document.createElement('th');
      th.textContent = text;
      headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);
    table.appendChild(thead);

    // BODY
    const tbody = document.createElement('tbody');

    data.forEach(item => {
      const row = document.createElement('tr');

      const values = [
        item.datetime,
        item.hum,
        item.par,
        item.soil_moisture,
        item.temp
      ];

      values.forEach(val => {
        const td = document.createElement('td');
        td.textContent = val;
        row.appendChild(td);
      });

      tbody.appendChild(row);
    });

    table.appendChild(tbody);

    return table;

  } catch (error) {
    console.error('Failed to load data:', error);
    const errorMsg = document.createElement('div');
    errorMsg.textContent = 'Failed to load data.';
    return errorMsg;
  }
}

function createChart(field, label) {
    console.log("Clicked:", field);

    const labels = dataset.map(d => d.datetime).reverse();
    const tempData = dataset.map(d => d.temp).reverse();
    const humData = dataset.map(d => d.hum).reverse();
    const soilData = dataset.map(d => d.soil_moisture).reverse();
    const lightData = dataset.map(d => d.par).reverse();

    const ctx = document.getElementById("chart");
    //const maxTempData = 30;
    //const minTempData = 15;

    // Destroy old chart if exists
    if (chart) chart.destroy();

    chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: labels,
        datasets: [
            {
                label: "Temperature",
                data: tempData,
                borderColor: "red",
                backgroundColor: "red",
                fill: false
            },
            {
                label: "Humidity",
                data: humData,
                borderColor: "blue",
                backgroundColor: "blue",
                fill: false
            },
            {
                label: "Soil Moisture",
                data: soilData,
                borderColor: "green",
                backgroundColor: "green",
                fill: false
            },
            {
                label: "Light",
                data: lightData,
                borderColor: "orange",
                backgroundColor: "orange",
                fill: false
            }
        ]
        },
        options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                labels: {
                    color: "darkgreen"
                }
            }
        },
        scales: {
            x: {
                ticks: {
                    color: "black"
                }
            },
            y: {
                ticks: {
                    color: "darkblue"
                }
            }
        }
    }
    });
}


document.addEventListener("DOMContentLoaded", function () {

    document.getElementById("tempCard").onclick = () => {
        createChart("temp", "Temperature", "red");
    };

    document.getElementById("humCard").onclick = () => {
        createChart("hum", "Humidity", "blue");
    };

    document.getElementById("soilCard").onclick = () => {
        createChart("soil_moisture", "Soil Moisture", "brown");
    };

    document.getElementById("lightCard").onclick = () => {
        createChart("par", "Light", "orange");
    };

});
  
function createChart(column, label, color) {

    fetch("/api/data")
        .then(res => res.json())
        .then(data => {

            const labels = dataset.map(d => d.datetime).reverse();
            const values = dataset.map(d => d[column]).reverse();

            const ctx = document.getElementById("chart");
            
            let max, min;

            if (column === "temp") {
                max = 31.5;
                min = 12.9;
            } else if (column === "hum") {
                max = 83.2;
                min = 9.1;
            } else if (column === "soil_moisture") {
                max = 20.5;
                min = 16.5;
            } else if (column === "par") {
                max = 1400.0;
                min = 250.0;
            }
            // Destroy old chart before creating new one
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: labels,
                    datasets: [
                    {    
                        label: label,
                        data: values,
                        borderColor: color,
                        tension: 0.4
                    },
                    {
                        label: "Max Threshold",
                        data: labels.map(() => max),
                        borderColor: "DarkRed",
                        borderDash: [5, 5],
                        pointRadius: 0
                    },
                    {
                        label: "Min Threshold",
                        data: labels.map(() => min),
                        borderColor: "DarkGreen",
                        borderDash: [5, 5],
                        pointRadius: 0
                    }
                ]
                },
                options: {
                    responsive: true,

                    scales: {
                        x: {
                            ticks: {
                                color: "blue"
                            },
                            grid: {
                                color: "#cccccc" // X-axis grid lines
                            }
                            },
                        y: {
                            ticks: {
                                color: "darkgreen"  // Y-axis numbers
                            },
                            grid: {
                                color: "#cccccc" // Y-axis grid lines
                            }
                            }
                        }
                    }
                }
            );
        });
}
</script>
<script src="/static/script.js"></script>
</body>
</html>
